name: wa_support_mobile
description: WhatsApp-style agent support app (Laravel API backend).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  record: ^6.0.0
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  url_launcher: ^6.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
