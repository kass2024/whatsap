# Apache 2.4+ — Laravel + PHP-FPM (/opt/php82)
# Server tree: repo at /var/www/whatsap → Laravel API in wa-support-api/
#
# ON THE SERVER:
#   cd /var/www/whatsap/wa-support-api
#   sudo cp deploy/apache/whatsapp.parrotcanada.site.conf /etc/apache2/sites-available/
#   sudo nano /etc/apache2/sites-available/whatsapp.parrotcanada.site.conf
#   → Adjust SetHandler socket to match php-fpm pool "listen"
#
#   sudo a2enmod proxy proxy_fcgi setenvif rewrite ssl headers
#   sudo a2ensite whatsapp.parrotcanada.site.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# SSL: sudo certbot --apache -d whatsapp.parrotcanada.site
# If HTTPS breaks after Certbot, ensure the :443 vhost also has the same <FilesMatch> PHP block.
#
# If your Laravel app is deployed at /var/www/whatsap with no wa-support-api/ subfolder,
# change every path to /var/www/whatsap/public (and .well-known under it).

<VirtualHost *:80>
    ServerName whatsapp.parrotcanada.site
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/whatsap/wa-support-api/public
    DirectoryIndex index.php

    <Directory /var/www/whatsap/wa-support-api/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php82-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # Let's Encrypt HTTP-01
    <Directory "/var/www/whatsap/wa-support-api/public/.well-known">
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/whatsapp.parrotcanada.site-error.log
    CustomLog ${APACHE_LOG_DIR}/whatsapp.parrotcanada.site-access.log combined
</VirtualHost>
