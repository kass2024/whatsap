# Apache 2.4+ virtual host for Laravel (PHP 8.2 via PHP-FPM at /opt/php82).
#
# 1. Ensure PHP-FPM from /opt/php82 is running and its pool "listen" matches
#    the SetHandler unix: path below (check /opt/php82/etc/php-fpm.d/*.conf).
# 2. Adjust DocumentRoot to your real deploy path on the server.
# 3. Enable modules: a2enmod proxy proxy_fcgi setenvif rewrite ssl headers
# 4. Copy to /etc/apache2/sites-available/ then: a2ensite whatsapp.parrotcanada.site.conf
# 5. apache2ctl configtest && systemctl reload apache2
# 6. SSL: certbot --apache -d whatsapp.parrotcanada.site

<VirtualHost *:80>
    ServerName whatsapp.parrotcanada.site
    ServerAdmin webmaster@localhost

    # Laravel public directory (not project root)
    DocumentRoot /var/www/wa-support-api/public

    <Directory /var/www/wa-support-api/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Route .php to PHP-FPM — socket must match php-fpm pool "listen = ..."
    # If your pool uses TCP (e.g. 127.0.0.1:9082), replace the block below with:
    #   <FilesMatch "\.php$">
    #       SetHandler "proxy:fcgi://127.0.0.1:9082"
    #   </FilesMatch>
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php82-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # Optional: deny access to hidden files except .well-known (ACME)
    <DirectoryMatch "^/.*/\.">
        <IfModule mod_authz_core.c>
            Require all denied
        </IfModule>
    </DirectoryMatch>
    <Directory "/var/www/wa-support-api/public/.well-known">
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/whatsapp.parrotcanada.site-error.log
    CustomLog ${APACHE_LOG_DIR}/whatsapp.parrotcanada.site-access.log combined
</VirtualHost>
