; Snippet for /opt/php82/etc/php-fpm.d/
; Use ONE pool per listen socket — either edit the default `www` pool's `listen =`
; to `/run/php/php82-fpm.sock` OR use this file as a separate pool and disable
; the default pool's duplicate listener. Apache's SetHandler must match `listen`.
;
; After editing, restart PHP-FPM:
;   sudo /opt/php82/sbin/php-fpm --fpm-config /opt/php82/etc/php-fpm.conf
;   # or: sudo systemctl restart php82-fpm

[parrot-whatsapp]
user = www-data
group = www-data
listen = /run/php/php82-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
php_admin_value[error_log] = /var/log/php82-fpm-parrot.log
catch_workers_output = yes
